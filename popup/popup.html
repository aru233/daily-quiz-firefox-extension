<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Quiz — Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <span class="header-logo">✦</span>
    <span class="header-title">Daily News Quiz</span>
  </header>

  <main class="body">
    <label for="input-api-key">Google AI Studio API Key</label>
    <div class="key-row">
      <input
        type="password"
        id="input-api-key"
        placeholder="AIza…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="btn-save-key" class="btn-primary btn-small">Save</button>
    </div>
    <p class="hint">
      Get a key at
      <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">
        aistudio.google.com
      </a>
    </p>

    <label for="select-model">Model</label>
    <select id="select-model">
      <option value="gemini-3-flash-preview">gemini-3-flash-preview (default)</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>

    <div class="actions">
      <button id="btn-refresh-now" class="btn-secondary btn-small">Refresh quiz now</button>
    </div>

    <p id="status" class="status hint"></p>
  </main>

  <script src="../api/gemini.js"></script>
  <script src="../api/news.js"></script>
  <script src="../api/quiz.js"></script>
  <script src="popup.js"></script>
</body>
</html>
